name: Attach release artifacts

# Distribution is GitHub-only for now (PyPI deferred — see PLAN.md Release
# Checklist). On each published release, build the sdist + wheel and attach
# them as release assets so users can install a pinned, verified artifact.

on:
  release:
    types: [published]

permissions:
  contents: write # upload assets to the release

jobs:
  build-and-attach:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Attach sdist and wheel to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/* --clobber
