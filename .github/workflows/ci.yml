name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"  # Weekly Monday 08:00 UTC

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Pin ruff to match pre-commit
        run: pip install ruff==0.15.20
      - name: ruff check
        id: check
        run: ruff check src/ tests/
      - name: ruff format
        id: format
        run: ruff format --check src/ tests/
      - name: mypy
        id: mypy
        run: mypy src/ --ignore-missing-imports
      - name: Job summary
        if: always()
        run: |
          {
            echo "## Lint"
            echo ""
            echo "| Check | Status |"
            echo "|-------|--------|"
            echo "| ruff check | ${{ steps.check.outcome || 'skipped' }} |"
            echo "| ruff format | ${{ steps.format.outcome || 'skipped' }} |"
            echo "| mypy | ${{ steps.mypy.outcome || 'skipped' }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Run tests
        id: tests
        run: |
          pytest tests/ -v --tb=short \
            --cov=autoharness \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14
      - name: Job summary
        if: always()
        run: |
          {
            echo "## Tests"
            echo ""
            echo "Result: ${{ steps.tests.outcome }}"
            echo ""
            echo "Coverage report uploaded as artifact."
          } >> "$GITHUB_STEP_SUMMARY"

  plan-conformance:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Run plan conformance tests
        id: plan
        run: pytest tests/plan/ -v --tb=short
      - name: Job summary
        if: always()
        run: |
          {
            echo "## Plan Conformance"
            echo ""
            echo "Result: ${{ steps.plan.outcome }}"
            echo ""
            echo "Checks plan commitments against repo state."
          } >> "$GITHUB_STEP_SUMMARY"

  doc-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Verify doc snippets (parse + import)
        id: doc_parse
        run: python scripts/verify_doc_snippets.py
      - name: Verify README quickstart (executable)
        id: doc_exec
        run: python scripts/verify_doc_snippets.py --executable
      - name: Job summary
        if: always()
        run: |
          {
            echo "## Doc Verification"
            echo ""
            echo "| Check | Status |"
            echo "|-------|--------|"
            echo "| parse + import | ${{ steps.doc_parse.outcome }} |"
            echo "| executable (README) | ${{ steps.doc_exec.outcome }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Install shellcheck and actionlint
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          # actionlint
          curl -sL "https://github.com/rhysd/actionlint/releases/download/v1.7.7/actionlint_1.7.7_linux_amd64.tar.gz" \
            | tar xz -C /usr/local/bin actionlint
      - name: Run actionlint
        id: actionlint
        run: actionlint .github/workflows/ci.yml
      - name: gitleaks
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pin to match local ~/bin/gitleaks — update both when upgrading.
          # See AGENTS.md "Security" section for version source of truth.
          GITLEAKS_VERSION: "8.18.4"
      - name: Run shellcheck on scripts
        id: shellcheck
        run: shellcheck scripts/*.sh
      - name: Run security scan
        id: security_scan
        run: bash scripts/security-scan.sh --quiet
      - name: Job summary
        if: always()
        run: |
          {
            echo "## Security"
            echo ""
            echo "| Check | Status |"
            echo "|-------|--------|"
            echo "| actionlint | ${{ steps.actionlint.outcome }} |"
            echo "| gitleaks | ${{ steps.gitleaks.outcome }} |"
            echo "| shellcheck | ${{ steps.shellcheck.outcome }} |"
            echo "| security scan | ${{ steps.security_scan.outcome }} |"
          } >> "$GITHUB_STEP_SUMMARY"
