repos:
  # Code quality
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        args: [--config-file=pyproject.toml, --ignore-missing-imports, src/, tests/, examples/]
        additional_dependencies: ["pydantic[mypy]", pytest]
        pass_filenames: false

  # Security — secrets detection
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  # Security — Python static analysis
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.6
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]
        additional_dependencies: ["bandit[toml]"]

  # Local — violation tracking (replaces .githooks/post-commit)
  - repo: local
    hooks:
      - id: update-violations
        name: update-violations
        entry: bash scripts/update-violations.sh --quiet
        language: system
        stages: [post-commit]
